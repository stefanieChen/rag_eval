# RAG Evaluation Suite configuration

judge:
  provider: "ollama"              # "ollama" | "openai" | "anthropic"
  model: "qwen2.5:7b"            # Model name (provider-specific)
  ollama_base_url: "http://localhost:11434"
  # openai_api_key: "${OPENAI_API_KEY}"
  # anthropic_api_key: "${ANTHROPIC_API_KEY}"
  temperature: 0.0
  max_tokens: 2048
  structured_output: true         # Use JSON mode for reliable parsing
  num_judges: 1                   # >1 enables multi-judge consensus
  timeout: 120                    # seconds per LLM call

rag:
  project_path: "../rag_2"
  config_path: "../rag_2/config/settings.yaml"

evaluation:
  default_metrics:
    - "retrieval"
    - "faithfulness"
    - "relevancy"
    - "completeness"
    - "hallucination"
    - "semantic_similarity"
  retrieval:
    k_values: [1, 3, 5, 10]
  generation:
    score_range: [1, 5]           # Min/max for pointwise scoring
  semantic:
    embedding_model: "all-MiniLM-L6-v2"
  hallucination:
    claim_threshold: 0.5          # Score below this = hallucinated claim

experiment:
  statistical_test: "wilcoxon"    # "wilcoxon" | "bootstrap" | "paired_t"
  significance_level: 0.05
  bootstrap_iterations: 1000
  num_repetitions: 1              # Repeat each query N times for variance

reporting:
  output_dir: "data/results"
  formats: ["json"]               # "json", "html"
  include_judge_reasoning: true
  dashboard_port: 8501
