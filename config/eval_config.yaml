# RAG Evaluation Suite configuration

judge:
  provider: "ollama"              # "ollama" | "openai" | "anthropic"
  model: "qwen2.5:7b"            # Model name (provider-specific)
  ollama_base_url: "http://localhost:11434"
  # openai_api_key: "${OPENAI_API_KEY}"
  # anthropic_api_key: "${ANTHROPIC_API_KEY}"
  temperature: 0.0
  max_tokens: 2048
  structured_output: true         # Use JSON mode for reliable parsing
  num_judges: 1                   # >1 enables multi-judge consensus
  timeout: 120                    # seconds per LLM call

logging:
  level: INFO
  log_dir: logs
  format: "[%(asctime)s] %(levelname)s %(name)s - %(message)s"
  rotation:
    max_bytes: 5242880   # 5 MB
    backup_count: 3
  modules:
    pipeline:
      file: pipeline.log
    experiment:
      file: experiment.log

rag:
  # Client type: "rag2" (direct import), "http" (REST API), or fully-qualified class path
  client_type: "rag2"

  # --- rag2 client settings (used when client_type = "rag2") ---
  project_path: "../rag_2"
  config_path: "../rag_2/config/settings.yaml"

  # --- HTTP client settings (used when client_type = "http") ---
  # http:
  #   base_url: "http://localhost:8000"
  #   query_endpoint: "/query"
  #   method: "POST"
  #   timeout: 30
  #   headers:
  #     Content-Type: "application/json"
  #   request_body_template:
  #     question: "{question}"
  #   response_mapping:
  #     answer: "answer"                # dot-path into JSON response
  #     contexts: "sources[].content"   # supports []-expansion
  #     context_ids: "sources[].id"

evaluation:
  default_metrics:
    - "retrieval"
    - "faithfulness"
    - "relevancy"
    - "completeness"
    - "hallucination"
    - "semantic_similarity"
  retrieval:
    k_values: [1, 3, 5, 10]
  generation:
    score_range: [1, 5]           # Min/max for pointwise scoring
  semantic:
    embedding_model: "all-MiniLM-L6-v2"
  hallucination:
    claim_threshold: 0.5          # Score below this = hallucinated claim

experiment:
  statistical_test: "wilcoxon"    # "wilcoxon" | "bootstrap" | "paired_t"
  significance_level: 0.05
  bootstrap_iterations: 1000
  num_repetitions: 1              # Repeat each query N times for variance

reporting:
  output_dir: "data/results"
  formats: ["json"]               # "json", "html"
  include_judge_reasoning: true
  dashboard_port: 8501
